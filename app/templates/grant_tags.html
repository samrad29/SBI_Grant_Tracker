<!DOCTYPE html>
<html>
<head>
    <title>Mission Control - Grant Tags</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: #1e293b;
        }

        th, td {
            padding: 10px;
            border-bottom: 1px solid #334155;
            text-align: left;
        }

        th {
            background: #020617;
        }

        tr:hover {
            background: #334155;
        }

        .status-success {
            color: #22c55e;
            font-weight: bold;
        }

        .status-failed {
            color: #ef4444;
            font-weight: bold;
        }

        .status-running {
            color: #facc15;
            font-weight: bold;
        }

        a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <h1>Grant Tags</h1>
    <table>
        <thead>
            <tr>
                <th>Tag</th>
                <th>Count</th>
            </tr>
        </thead>
        <tbody>
            {% for row in grant_tags %}
            <tr>
                <td><a href="{{ url_for('dashboard.grant_tag_detail_page', tag=row['tag']) }}">{{ row['tag'] }}</a></td>
                <td>{{ row['count'] }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
